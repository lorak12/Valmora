title: "Valmora Forge"
layout:
  - "BBBBBBBBB"
  - "B I+I=O B"
  - "BBBB^BBBB"

components:
  B:
    item: "BLACK_STAINED_GLASS_PANE"
    name: " "

  # Decorations
  +:
    item: "LIME_STAINED_GLASS_PANE"
    name: "<green>Combine"
  =:
    item: "LIME_STAINED_GLASS_PANE"
    name: "<green>Result"

  ^:
    item: "ARROW"
    name: "<red>Go Back"
    click:
      - action: "BACK"

  # Unrestricted Input Slots (Shift-Clicking supported!)
  I:
    type: "INPUT"

  # The Output Slot (Safe extraction & extraction-based consumption)
  O:
    type: "OUTPUT"
    # Note: State/Visuals for this slot will be overridden by your Java Recipe system
    # updating the ViewContext when an input changes.
    item: "AIR"
