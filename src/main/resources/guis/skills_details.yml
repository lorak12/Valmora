# PAGE 2 (26-50)
combat_skill_two:
  title: "<dark_gray>$prop.target_skill.name$ Skill (26-50)</dark_gray>"
  rows: 6
  update-interval: 20
  layout:
    - "S.hij.rst"
    - "a.g.k.q.u"
    - "b.f.l.p.v"
    - "cde.mno.w"
    - "...X.Y..x"
    - "....Z>..y"
  components:
    ".":
      {
        type: DISPLAY,
        display-item: { material: GRAY_STAINED_GLASS_PANE, name: " " },
      }
    S:
      {
        type: DISPLAY,
        display-item:
          {
            material: "$prop.target_skill.material$",
            name: "<green>$prop.target_skill.name$ Skill",
            lore: ["<gray>Levels 26-50"],
          },
      }
    a:
      {
        type: DISPLAY,
        states:
          [
            {
              condition: "$prop.target_skill.level$ > 26",
              item: LIME_STAINED_GLASS_PANE,
              amount: 26,
              name: "<green>$prop.target_skill.name$ Level XXVI",
            },
            {
              condition: "$prop.target_skill.level$ == 26",
              item: YELLOW_STAINED_GLASS_PANE,
              amount: 26,
              name: "<yellow>$prop.target_skill.name$ Level XXVI",
            },
            {
              condition: "default",
              item: RED_STAINED_GLASS_PANE,
              amount: 26,
              name: "<red>$prop.target_skill.name$ Level XXVI",
            },
          ],
      }
    # ... (rest of Page 2 should follow same pattern, but user mainly wanted Page 1 for now)
    ">":
      {
        type: DISPLAY,
        display-item: { material: ARROW, name: "<green>Next Levels" },
        actions:
          {
            left:
              {
                actions:
                  [
                    "open_gui combat_skill_three target_skill=$prop.target_skill$",
                  ],
              },
          },
      }
    Z:
      {
        type: DISPLAY,
        display-item: { material: ARROW, name: "<gray>Back to 1 - 25" },
        actions:
          {
            left:
              {
                actions:
                  ["open_gui skill_details target_skill=$prop.target_skill$"],
              },
          },
      }

