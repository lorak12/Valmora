# =====================================================================
# Dynamic Skill path GUI
# Supports any skill passed via 'target_skill' parameter.
# =====================================================================

skill_details:
  title: "<dark_gray>$prop.target_skill.name$ Skill</dark_gray>"
  rows: 6
  update-interval: 20

  layout:
    - "SBhijBrst"
    - "aBgBkBqBu"
    - "bBfBlBpBv"
    - "cdeBmnoBw"
    - "BBBXBYBBx"
    - "B<BBZBB>y"

  components:
    # --- UI BORDERS ---
    B:
      type: DISPLAY
      display-item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "

    # --- MAIN SKILL ICON ---
    S:
      type: DISPLAY
      display-item:
        material: "$prop.target_skill.material$"
        name: "<green>$prop.target_skill.name$ Skill"
        lore:
          - "<gray>$prop.target_skill.description$"
          - "<gray>Progress to Level $prop.target_skill.next_level$: <yellow>$prop.target_skill.progress$%"
          - "<white>-------------------- <yellow>$prop.target_skill.xp_in_level$<gold>/</gold><yellow>$prop.target_skill.xp_required$"
          - ""
          - "<dark_gray>Increase your $prop.target_skill.name$ Level to"
          - "<dark_gray>unlock Perks, statistic bonuses, and"
          - "<dark_gray>more!"

    # --- DYNAMIC PAGINATED LEVELS ---
    "abcdefghijklmnopqrstuvwxy":
      type: PAGINATED
      # This dynamically generates a list like [1, 2, 3 ... 60] based on the skill's max level!
      list: "$range.1.prop.target_skill.max_level$"
      iterator: "lvl"
      states:
        # State 1: Already Reached
        completed:
          condition: "$prop.target_skill.level$ >= $lvl$"
          item: LIME_STAINED_GLASS_PANE
          amount: "$lvl$"
          name: "<green>$prop.target_skill.name$ Level $lvl$"
          lore:
            - "<gray>Status: <green>Unlocked!"

        # State 2: Currently Working On
        current:
          condition: "$prop.target_skill.level$ == $lvl$ - 1"
          item: YELLOW_STAINED_GLASS_PANE
          amount: "$lvl$"
          name: "<yellow>$prop.target_skill.name$ Level $lvl$"
          lore:
            - "<gray>Status: <yellow>In Progress"
            - "<gray>Progress: <yellow>$prop.target_skill.progress$%"

        # State 3: Locked (Fallback)
        locked:
          condition: "default"
          item: RED_STAINED_GLASS_PANE
          amount: "$lvl$"
          name: "<red>$prop.target_skill.name$ Level $lvl$"
          lore:
            - "<gray>Status: <red>Locked"

    # --- EXTRAS (Bestiary, Slayer, Back) ---
    X:
      type: DISPLAY
      display-item:
        material: BOOK_AND_QUILL
        name: "<aqua>Bestiary"
        lore:
          - "<gray>Compendium of mobs..."
          - "<yellow>Click to view!"
    Y:
      type: DISPLAY
      display-item:
        material: LEVER
        name: "<dark_purple>Slayer"
        lore:
          - "<gray>Take on a <dark_purple>Slayer Quest..."
    Z:
      type: DISPLAY
      display-item:
        material: BARRIER
        name: "<red>Back to Skills"
      actions:
        left:
          actions: ["open_gui skills_list"]

    # --- PAGINATION CONTROLS ---
    "<":
      type: PREVIOUS_PAGE
      display-item:
        material: ARROW
        name: "<green>Previous Page"
      fallback:
        material: GRAY_STAINED_GLASS_PANE
        name: " "

    ">":
      type: NEXT_PAGE
      display-item:
        material: ARROW
        name: "<green>Next Page"
      fallback:
        material: GRAY_STAINED_GLASS_PANE
        name: " "
