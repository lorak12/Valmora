# =====================================================================
# Valmora Forge GUI  - 36 slots (4x9)
#
# Layout:
#  B = Black glass border
#  G = Grey glass filler
#  I = Input slot 1 (base item)
#  M = Input slot 2 (material)
#  O = Output slot (result)
#  F = Forge info button
# =====================================================================

forge:
  title: "<dark_red><bold>⚒ Valmora Forge</bold></dark_red>"
  rows: 4
  machine: forge
  update-interval: 0

  layout:
    - "BBBBBBBBB"
    - "BGGGGGGGB"
    - "BGIBMOGBB"
    - "BBBBFBBBB"

  components:
    B:
      type: DISPLAY
      display-item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        amount: 1

    G:
      type: DISPLAY
      display-item:
        material: GRAY_STAINED_GLASS_PANE
        name: " "
        amount: 1

    I:
      type: INPUT
      id: input1

    M:
      type: INPUT
      id: input2

    O:
      type: OUTPUT
      id: result

    F:
      type: DISPLAY
      display-item:
        material: BLAST_FURNACE
        name: "<red><bold>⚒ Forge Guide</bold></red>"
        lore:
          - "<gray>Place your <yellow>base item</yellow>"
          - "<gray>in the left input slot."
          - ""
          - "<gray>Place the <aqua>material</aqua>"
          - "<gray>in the middle slot."
          - ""
          - "<gray>Collect the result from the"
          - "<gray><green>right output slot</green>."
          - ""
          - "<dark_gray>Forge-specific recipes only."
        amount: 1

  on-open:
    actions:
      - "sound player block.blast_furnace.crack"
  on-close: {}
