name: Valmora
version: "0.1"
main: org.nakii.valmora.Valmora
api-version: "1.21"
authors: [nakii]
description: A MMORPG engine for creating anything one can imagine.

commands:
  profile:
    usage: /profile help
  stat:
    usage: /stat help
  item:
    usage: /item help
  mob:
    usage: /mob help
  skills:
    usage: /skills
    description: View all your skills and their progress.
  skill:
    usage: /skill <name> [level]
    description: View detailed info about a specific skill.
  skilladmin:
    usage: /skilladmin <givexp|setlevel> <player> <skill> <value>
    description: Admin commands for managing player skill data.
    permission: valmora.admin
