# =====================================================================
# Valmora Crafting Table GUI  - 54 slots (6x9)
#
# Layout:
#  B = Black glass border
#  I = Input slot (ingredient)
#  O = Output slot (result)
#  H = Help button
#  ' ' = Empty (player inventory access)
# =====================================================================

crafting_table:
  title: "<yellow>⚒ Crafting Table</yellow>"
  rows: 6
  machine: crafting_table
  update-interval: 1000

  layout:
    - "BBBBBBBBB"
    - "BIIIBBBBB"
    - "BIIIBHBOB"
    - "BIIIBBBBB"
    - "BBBBBBBBB"
    - "BBBRCBBBB"

  components:
    R:
      type: DISPLAY
      display-item:
        material: KNOWLEDGE_BOOK
        name: "<white>Recipe list"
        amount: 1
    C:
      type: DISPLAY
      display-item:
        material: BARRIER
        name: "<red>Close"
        amount: 1
    B:
      type: DISPLAY
      display-item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        amount: 1

    I:
      type: INPUT
      id: ingredient

    O:
      type: OUTPUT
      id: result

    H:
      type: DISPLAY
      display-item:
        material: CRAFTING_TABLE
        name: "<aqua><bold>✦ How to Craft</bold></aqua>"
        lore:
          - "<gray>Place your ingredients in the"
          - "<gray>nine input slots on the left."
          - ""
          - "<gray>If a valid recipe is matched,"
          - "<gray>the result will appear on the right."
          - ""
          - "<gray>Click the result to collect it."
        amount: 1

  on-open:
    actions:
      - "sound player block.note_block.pling"
  on-close: {}
