# =====================================================================
# Valmora Stats GUI  - 54 slots (6x9)
#
# Shows live player stats using $player.stat.X$ variables.
# Refreshes every second (200 ticks).
#
# Layout key:
#  B = Black glass border
#  G = Gray filler
#  H = Health stat
#  D = Damage stat
#  F = Defense stat
#  S = Speed stat
#  M = Mana stat
#  T = Strength stat
#  K = Crit stats
#  R = Health Regen
#  N = Mana Regen
# =====================================================================

stats:
  title: "<yellow>Character Profile - <green>$player.name$"
  rows: 6
  update-interval: 20

  layout:
    - "BGGGGGGGB"
    - "GXXXGXXXG"
    - "GXXXGXXXG"
    - "GXXXPXXXG"
    - "GXXXGXXXG"
    - "BGGGCGGGB"

  components:
    G:
      type: DISPLAY
      display-item:
        item: GRAY_STAINED_GLASS_PANE
        name: " "
    B:
      type: DISPLAY
      display-item:
        item: BLUE_STAINED_GLASS_PANE
        name: " "
    C:
      type: DISPLAY
      display-item:
        item: BARRIER
        name: "<red><bold>CLOSE SHEET"
        lore:
          - "<gray>Click to return to world."
      actions:
        left:
          actions:
            - "close"
    P:
      type: DISPLAY
      display-item:
        item: PLAYER_HEAD
        name: "<blue><bold>$player.name$"
        lore:
          - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━"
          - " <gray>Location: <white>$player.world$"
          - " <gray>Biome: <white>$player.biome$"
          - " <gray>Ping: <green>$player.ping$ms"
          - ""
          - " <red>Health: <white>$player.hp$/$player.max_hp$ <gray>($player.health_percent$%)"
          - " <aqua>Mana: <white>$player.mana$/$player.max_mana$"
          - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━"
    X:
      type: PAGINATED
      list: "$player.stat.list$"
      iterator: "x"
      states:
        default:
          item: "$x.material$"
          name: "$x.name$"
          lore:
            - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━"
            - " <gray>Value: <white>$x.display_value$"
            - ""
            - " <italic><gray>$x.description$"
            - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━"

  on-open:
    actions:
      - "sound player block.note_block.hat"
  on-close: {}
