# =====================================================================
# Valmora Stats GUI  - 54 slots (6x9)
#
# Shows live player stats using $player.stat.X$ variables.
# Refreshes every second (20 ticks).
#
# Layout key:
#  B = Black glass border
#  G = Gray filler
#  H = Health stat
#  D = Damage stat
#  F = Defense stat
#  S = Speed stat
#  M = Mana stat
#  T = Strength stat
#  K = Crit stats
#  R = Health Regen
#  N = Mana Regen
# =====================================================================

stats:
  title: "<red><bold>❤ Character Sheet</bold></red>"
  rows: 6
  update-interval: 20

  layout:
    - "BBBBBBBBB"
    - "BHDFSTBBB"
    - "BMNKRBGBB"
    - "BGGGGGBBB"
    - "BGGGGGBBB"
    - "BBBBBBBBB"

  components:
    B:
      type: DISPLAY
      display-item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        amount: 1

    G:
      type: DISPLAY
      display-item:
        material: GRAY_STAINED_GLASS_PANE
        name: " "
        amount: 1

    H:
      type: DISPLAY
      display-item:
        material: REDSTONE
        name: "<red><bold>❤ Health</bold></red>"
        lore:
          - "<gray>Current:  <green>$player.hp$"
          - "<gray>Maximum: <green>$player.max_hp$"
          - ""
          - "<dark_gray>Your total hit points."
        amount: 1

    D:
      type: DISPLAY
      display-item:
        material: IRON_SWORD
        name: "<yellow><bold>⚔ Damage</bold></yellow>"
        lore:
          - "<gray>Damage: <yellow>$player.stat.DAMAGE$"
          - ""
          - "<dark_gray>Base damage dealt to enemies."
        amount: 1

    F:
      type: DISPLAY
      display-item:
        material: SHIELD
        name: "<green><bold>🛡 Defense</bold></green>"
        lore:
          - "<gray>Defense: <green>$player.stat.DEFENSE$"
          - ""
          - "<dark_gray>Reduces incoming damage."
        amount: 1

    S:
      type: DISPLAY
      display-item:
        material: SUGAR
        name: "<white><bold>⚡ Speed</bold></white>"
        lore:
          - "<gray>Speed: <white>$player.stat.SPEED$"
          - ""
          - "<dark_gray>Movement speed modifier."
        amount: 1

    T:
      type: DISPLAY
      display-item:
        material: BLAZE_POWDER
        name: "<dark_red><bold>💢 Strength</bold></dark_red>"
        lore:
          - "<gray>Strength: <dark_red>$player.stat.STRENGTH$"
          - ""
          - "<dark_gray>Boosts melee damage output."
        amount: 1

    M:
      type: DISPLAY
      display-item:
        material: LAPIS_LAZULI
        name: "<aqua><bold>✦ Mana</bold></aqua>"
        lore:
          - "<gray>Current:  <aqua>$player.mana$"
          - "<gray>Maximum: <aqua>$player.max_mana$"
          - ""
          - "<dark_gray>Used to cast abilities."
        amount: 1

    N:
      type: DISPLAY
      display-item:
        material: CYAN_DYE
        name: "<dark_aqua><bold>♻ Mana Regen</bold></dark_aqua>"
        lore:
          - "<gray>Regen: <dark_aqua>$player.stat.MANA_REGEN$/s"
          - ""
          - "<dark_gray>Mana restored per second."
        amount: 1

    K:
      type: DISPLAY
      display-item:
        material: GOLD_NUGGET
        name: "<gold><bold>☆ Critical Strike</bold></gold>"
        lore:
          - "<gray>Crit Chance: <gold>$player.stat.CRIT_CHANCE$%"
          - "<gray>Crit Damage: <gold>$player.stat.CRIT_DAMAGE$%"
          - ""
          - "<dark_gray>Chance to deal bonus damage."
        amount: 1

    R:
      type: DISPLAY
      display-item:
        material: GLISTERING_MELON_SLICE
        name: "<light_purple><bold>♥ Health Regen</bold></light_purple>"
        lore:
          - "<gray>Regen: <light_purple>$player.stat.HEALTH_REGEN$/s"
          - ""
          - "<dark_gray>Health restored per second."
        amount: 1

  on-open:
    actions:
      - "sound player block.note_block.hat"
  on-close: {}
