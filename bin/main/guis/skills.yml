# =====================================================================
# Valmora Skills GUI  - 54 slots (6x9)
#
# Shows all 5 skills with level via $player.skill.SKILL$ variables.
# Skills: COMBAT, FARMING, FISHING, MINING, FORAGING
# =====================================================================

skills:
  title: "<gold><bold>✦ Skills</bold></gold>"
  rows: 6
  update-interval: 40

  layout:
    - "BBBBBBBBB"
    - "BCBFBSBBB"
    - "BBBBBBBBB"
    - "BHBOBBBBB"
    - "BBBBBBBBB"
    - "BBBBBBBBB"

  components:
    B:
      type: DISPLAY
      display-item:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        amount: 1

    # COMBAT
    C:
      type: DISPLAY
      display-item:
        material: IRON_SWORD
        name: "<red><bold>⚔ Combat</bold></red>"
        lore:
          - "<gray>Level: <yellow>$player.skill.COMBAT$"
          - ""
          - "<dark_gray>Slay mobs to earn Combat XP."
          - "<dark_gray>Max Level: <white>60"
        amount: 1

    # FARMING
    F:
      type: DISPLAY
      display-item:
        material: WHEAT
        name: "<green><bold>🌾 Farming</bold></green>"
        lore:
          - "<gray>Level: <yellow>$player.skill.FARMING$"
          - ""
          - "<dark_gray>Grow and harvest crops for XP."
          - "<dark_gray>Max Level: <white>60"
        amount: 1

    # FISHING
    S:
      type: DISPLAY
      display-item:
        material: FISHING_ROD
        name: "<aqua><bold>🎣 Fishing</bold></aqua>"
        lore:
          - "<gray>Level: <yellow>$player.skill.FISHING$"
          - ""
          - "<dark_gray>Catch fish and sea creatures for XP."
          - "<dark_gray>Max Level: <white>60"
        amount: 1

    # MINING
    H:
      type: DISPLAY
      display-item:
        material: IRON_PICKAXE
        name: "<dark_gray><bold>⛏ Mining</bold></dark_gray>"
        lore:
          - "<gray>Level: <yellow>$player.skill.MINING$"
          - ""
          - "<dark_gray>Mine ores and gems for XP."
          - "<dark_gray>Max Level: <white>60"
        amount: 1

    # FORAGING
    O:
      type: DISPLAY
      display-item:
        material: OAK_SAPLING
        name: "<dark_green><bold>🌿 Foraging</bold></dark_green>"
        lore:
          - "<gray>Level: <yellow>$player.skill.FORAGING$"
          - ""
          - "<dark_gray>Forage herbs and mushrooms for XP."
          - "<dark_gray>Max Level: <white>60"
        amount: 1

  on-open:
    actions:
      - "sound player entity.experience_orb.pickup"
  on-close: {}
